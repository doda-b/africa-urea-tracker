# .github/workflows/build_charts.yml
#
# Generates Excel charts from the urea trade data.
# Separate from the data fetch workflow — run this after data exists.

name: Build Urea Charts

on:
  workflow_dispatch:  # Manual trigger
  workflow_run:
    workflows: ["Fetch African Urea Trade Data"]
    types: [completed]

jobs:
  build-charts:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Build charts
        run: python scripts/build_charts.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update urea charts: $(date +%Y-%m-%d)"
          git push
