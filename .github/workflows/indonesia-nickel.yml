name: indonesia-nickel-raw

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests pandas

      - name: Dump raw Comtrade data
        env:
          COMTRADE_KEY: ${{ secrets.COMTRADE_API_KEY }}
        run: python nickel_raw_dump.py

      - uses: actions/upload-artifact@v4
        with:
          name: indonesia-nickel-raw
          path: indonesia_nickel_raw.csv
