name: indonesia-nickel-chart

# Run on demand from the Actions tab. Add push/schedule triggers if you want it automatic.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests pandas matplotlib

      - name: Pull Comtrade and build chart
        env:
          COMTRADE_KEY: ${{ secrets.COMTRADE_API_KEY }}   # reuse your existing repo secret
        run: python pull_indonesia_nickel.py

      - uses: actions/upload-artifact@v4
        with:
          name: indonesia-nickel
          path: |
            indonesia_nickel_exports.csv
            indonesia_nickel_exports.png
